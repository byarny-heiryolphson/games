<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game & App Hub</title>
  <style>
    /* Global Styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(circle at center, #2e0800 0%, #0d0200 100%);
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    /* --- FLAME & LAVA EFFECT --- */
    
    /* Glowing Lava Bed at the Bottom */
    .lava-glow {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 120px;
      background: linear-gradient(to top, rgba(255, 68, 0, 0.8), rgba(255, 140, 0, 0.4), transparent);
      filter: blur(12px);
      z-index: 1;
      animation: lavaPulse 2.5s ease-in-out infinite alternate;
    }

    @keyframes lavaPulse {
      0% { opacity: 0.6; transform: scaleY(0.9); }
      100% { opacity: 1; transform: scaleY(1.1); }
    }

    /* Animated Flame Waves */
    .flame-wave {
      position: absolute;
      bottom: -10px;
      left: -10%;
      width: 120%;
      height: 80px;
      background: radial-gradient(ellipse at bottom, #ff3300 0%, #ff8800 50%, transparent 70%);
      border-radius: 40% 40% 0 0;
      filter: blur(8px);
      z-index: 1;
      opacity: 0.7;
      animation: flameFlicker 1.8s infinite ease-in-out alternate;
    }

    .flame-wave.layer2 {
      height: 110px;
      background: radial-gradient(ellipse at bottom, #ff5500 0%, #ffcc00 40%, transparent 70%);
      animation: flameFlicker 1.2s infinite ease-in-out alternate-reverse;
      opacity: 0.5;
    }

    @keyframes flameFlicker {
      0% { transform: scaleX(1) translateY(0); }
      50% { transform: scaleX(1.05) translateY(-8px); }
      100% { transform: scaleX(0.95) translateY(4px); }
    }

    /* Floating Fire Embers */
    .ember {
      position: absolute;
      bottom: 0;
      background: #ffcc00;
      border-radius: 50%;
      box-shadow: 0 0 10px #ff3300, 0 0 20px #ffaa00;
      opacity: 0;
      z-index: 1;
      animation: floatUp 3s infinite ease-in;
    }

    /* Random positioning and sizes for individual embers */
    .ember:nth-child(1) { left: 10%; width: 6px; height: 6px; animation-delay: 0s; animation-duration: 3.2s; }
    .ember:nth-child(2) { left: 25%; width: 4px; height: 4px; animation-delay: 0.8s; animation-duration: 2.5s; }
    .ember:nth-child(3) { left: 45%; width: 7px; height: 7px; animation-delay: 1.5s; animation-duration: 3.8s; }
    .ember:nth-child(4) { left: 65%; width: 5px; height: 5px; animation-delay: 0.3s; animation-duration: 2.9s; }
    .ember:nth-child(5) { left: 80%; width: 8px; height: 8px; animation-delay: 1.1s; animation-duration: 3.5s; }
    .ember:nth-child(6) { left: 92%; width: 4px; height: 4px; animation-delay: 1.9s; animation-duration: 2.2s; }
