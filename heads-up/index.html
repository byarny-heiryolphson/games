<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Heads Up!</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #f0f0f5;
    --muted: rgba(240,240,245,0.45);
    --hint: rgba(240,240,245,0.25);
    --accent: #7c6fff;
    --accent-dim: rgba(124,111,255,0.15);
    --green: #3ecf8e;
    --green-dim: rgba(62,207,142,0.12);
    --red: #ff5f57;
    --red-dim: rgba(255,95,87,0.12);
    --amber: #f5a623;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { height: 100%; height: -webkit-fill-available; }
  body { min-height: 100%; min-height: -webkit-fill-available; height: 100dvh; overflow: hidden; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  body { display: flex; flex-direction: column; }

  /* ── SCREENS ── */
  .screen { display: none; flex-direction: column; height: 100%; min-height: 0; overflow: hidden; }
  .screen.active { display: flex; }

  /* ── START SCREEN ── */
  #start-screen {
    align-items: center;
    justify-content: flex-start;
    background: var(--bg);
    padding: 0;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  /* Floating background particles */
  .bg-particle {
    position: absolute; border-radius: 50%; pointer-events: none;
    animation: bg-float linear infinite;
  }
  @keyframes bg-float {
    0%   { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 0.6; }
    100% { transform: translateY(-120px) rotate(720deg); opacity: 0; }
  }

  /* ── HERO ── */
  .home-hero {
    width: 100%;
    padding: 2.5rem 1.5rem 0;
    flex-shrink: 0;
    position: relative; z-index: 5;
  }
  .home-logo {
    font-size: 48px; line-height: 1;
    display: block; margin-bottom: 0.4rem;
    animation: logo-pop 0.6s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes logo-pop {
    0%   { opacity: 0; transform: scale(0.4) rotate(-15deg); }
    100% { opacity: 1; transform: scale(1) rotate(0deg); }
  }
  .home-title {
    font-size: 38px; font-weight: 900; letter-spacing: -1.5px;
    line-height: 1; margin-bottom: 6px;
    background: linear-gradient(135deg, #fff 0%, #c4b5fd 40%, #7c6fff 70%, #fff 100%);
    background-size: 250% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: title-rise 0.5s 0.1s cubic-bezier(.34,1.56,.64,1) both,
               shimmer 5s linear 0.6s infinite;
  }
  @keyframes title-rise {
    0%   { opacity: 0; transform: translateY(20px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes shimmer {
    0%   { background-position: 0% center; }
    100% { background-position: 250% center; }
  }
  .home-sub {
    font-size: 14px; color: var(--muted); margin-bottom: 0;
    animation: sub-rise 0.5s 0.2s ease both;
  }
  @keyframes sub-rise {
    0%   { opacity: 0; transform: translateY(8px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* ── CAROUSEL WRAPPER ── */
  .carousel-wrapper {
    width: 100%;
    flex: 1;
    position: relative;
    display: flex;
    align-items: center;
    min-height: 240px;
    overflow: hidden;
  }

  /* ── DECK CAROUSEL — native scroll snap ── */
  .deck-carousel {
    flex: 1;
    height: 100%;
    min-height: 240px;
    display: flex;
    align-items: center;
    overflow-x: scroll;
    overflow-y: hidden;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .deck-carousel::-webkit-scrollbar { display: none; }

  /* Padding slots so first/last card centers */
  .deck-carousel::before,
  .deck-carousel::after {
    content: '';
    flex: 0 0 32px;
    min-width: 32px;
  }

  /* ── DECK CARD ── */
  .deck-card-big {
    flex: 0 0 calc(100% - 80px);
    max-width: 320px;
    min-height: 200px;
    scroll-snap-align: center;
    border-radius: 24px;
    padding: 24px 20px 20px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    margin: 0 8px;
    transition: transform 0.2s, opacity 0.2s;
  }
  /* glossy sheen */
  .deck-card-big::before {
    content: '';
    position: absolute; top: 0; left: -60%; width: 40%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
    animation: card-sheen 3.5s ease-in-out infinite;
    pointer-events: none; z-index: 5;
  }
  @keyframes card-sheen {
    0%,100% { left: -60%; }
    50%      { left: 120%; }
  }
  .deck-card-big.neighbour { transform: scale(0.92); opacity: 0.55; }
  .deck-card-big.far-card  { opacity: 0; pointer-events: none; }

  .deck-card-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .deck-card-icon {
    font-size: 44px; line-height: 1;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
    animation: icon-bob 3s ease-in-out infinite;
  }
  @keyframes icon-bob {
    0%,100% { transform: translateY(0) rotate(-3deg); }
    50%      { transform: translateY(-6px) rotate(3deg); }
  }
  .deck-card-count-badge {
    font-size: 11px; font-weight: 700; padding: 4px 10px;
    border-radius: 20px; background: rgba(0,0,0,0.25);
    color: rgba(255,255,255,0.8); letter-spacing: 0.05em;
  }
  .deck-card-name {
    font-size: 26px; font-weight: 900; color: #fff;
    letter-spacing: -0.5px; margin-top: 10px; line-height: 1.1;
    text-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .deck-card-preview {
    display: flex; flex-direction: column; gap: 5px; margin-top: 10px;
  }
  .preview-word {
    font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.7);
    background: rgba(0,0,0,0.2); border-radius: 8px;
    padding: 4px 10px; text-align: left;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .deck-card-footer {
    display: flex; justify-content: space-between; align-items: center; margin-top: 14px;
  }
  .deck-browse-btn {
    font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.7);
    background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px; padding: 5px 14px; cursor: pointer;
    transition: background 0.2s;
  }
  .deck-browse-btn:hover { background: rgba(0,0,0,0.35); color: #fff; }
  .deck-pick-hint {
    font-size: 11px; font-weight: 600;
    color: rgba(255,255,255,0.5); letter-spacing: 0.05em;
  }

  /* ── ARROWS ── */
  .carousel-arrow {
    flex-shrink: 0;
    width: 32px; height: 32px; border-radius: 50%;
    background: rgba(255,255,255,0.08); border: 1px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 20px; color: var(--text);
    transition: background 0.2s, opacity 0.2s;
    opacity: 0.7; user-select: none; margin: 0 4px;
    flex-shrink: 0;
  }
  .carousel-arrow:hover { background: rgba(255,255,255,0.16); opacity: 1; }
  .carousel-arrow.hidden { opacity: 0; pointer-events: none; }

  /* ── DOTS ── */
  .carousel-dots {
    display: flex; gap: 6px; justify-content: center;
    padding: 8px 0 6px; flex-shrink: 0; position: relative; z-index: 5;
  }
  .carousel-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--border2);
    transition: all 0.3s cubic-bezier(.34,1.56,.64,1); cursor: pointer;
  }
  .carousel-dot.active { width: 20px; border-radius: 3px; background: var(--accent); }

  /* ── SCROLL PROGRESS ── */
  .carousel-scroll-track {
    width: calc(100% - 32px); max-width: 320px;
    height: 3px; background: var(--border); border-radius: 2px;
    margin: 0 auto 8px; flex-shrink: 0; position: relative; z-index: 5; overflow: hidden;
  }
  .carousel-scroll-thumb {
    position: absolute; top: 0; left: 0; height: 100%;
    background: var(--accent); border-radius: 2px;
    transition: left 0.3s ease, width 0.3s ease;
  }

  /* ── CTA ── */
  .home-cta {
    padding: 0 1.5rem 2rem; flex-shrink: 0;
    position: relative; z-index: 5; width: 100%;
  }
  .big-btn {
    width: 100%; max-width: 420px; padding: 16px; border-radius: 16px;
    font-size: 17px; font-weight: 700; cursor: pointer; border: none;
    transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    display: block; margin: 0 auto;
  }
  .big-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
  .big-btn:active { transform: scale(0.98); box-shadow: none; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:disabled { opacity: 0.3; cursor: default; transform: none; box-shadow: none; }
  .btn-secondary { background: var(--surface); border: 1px solid var(--border2); color: var(--text); margin-top: 10px; }

  /* ── DECK VIEWER ── */

  #deck-screen { background: var(--bg); }
  .deck-header {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 16px 12px; border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .back-btn {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--surface); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 18px; flex-shrink: 0;
  }
  .deck-header-title { font-size: 17px; font-weight: 700; }
  .deck-header-count { font-size: 13px; color: var(--muted); margin-top: 1px; }
  .deck-search {
    margin: 12px 16px; padding: 10px 14px; border-radius: 10px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-size: 15px; width: calc(100% - 32px);
    flex-shrink: 0;
  }
  .deck-search::placeholder { color: var(--hint); }
  .deck-search:focus { outline: none; border-color: var(--accent); }
  .deck-list { flex: 1; overflow-y: auto; padding: 0 16px 16px; }
  .deck-card {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 0; border-bottom: 1px solid var(--border);
  }
  .deck-num { font-size: 12px; color: var(--hint); min-width: 24px; padding-top: 2px; }
  .deck-word { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .deck-hint { font-size: 13px; color: var(--muted); }

  /* ── TIMER SCREEN ── */
  #timer-screen {
    align-items: center; justify-content: center;
    background: var(--bg); padding: 2rem 1.5rem; text-align: center;
  }
  .timer-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .timer-sub { font-size: 14px; color: var(--muted); margin-bottom: 0.5rem; }
  .ts-display { font-size: 64px; font-weight: 800; color: var(--accent); margin: 1rem 0 1.5rem; letter-spacing: -2px; }
  .ts-row { display: flex; gap: 10px; justify-content: center; margin-bottom: 2.5rem; flex-wrap: wrap; }
  .ts-opt {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 10px 22px; font-size: 15px; font-weight: 600;
    cursor: pointer; color: var(--muted); transition: all 0.15s;
  }
  .ts-opt.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

  /* ── COUNTDOWN ── */
  #countdown-screen {
    align-items: center; justify-content: center; background: var(--bg);
  }
  .cd-num { font-size: 140px; font-weight: 900; color: var(--accent); animation: cdbop 0.6s cubic-bezier(.36,.07,.19,.97); line-height: 1; }
  @keyframes cdbop { 0% { transform: scale(1.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  .cd-label { font-size: 16px; color: var(--muted); margin-top: 8px; letter-spacing: 0.1em; text-transform: uppercase; }

  /* ── GAME SCREEN ── */
  #game-screen { background: var(--bg); position: relative; }
  .game-hud {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 20px; flex-shrink: 0; position: relative; z-index: 20;
  }
  .hud-score { display: flex; gap: 20px; }
  .hud-item { text-align: center; }
  .hud-num { font-size: 24px; font-weight: 800; }
  .hud-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 1px; }
  .timer-ring { position: relative; width: 64px; height: 64px; flex-shrink: 0; }
  .timer-ring svg { transform: rotate(-90deg); }
  .timer-ring-num { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 17px; font-weight: 800; }

  .progress-track { height: 3px; background: var(--border); flex-shrink: 0; position: relative; z-index: 20; }
  .progress-fill { height: 100%; background: var(--accent); transition: width 0.35s; }

  /* ── CARD STAGE ── */
  .card-stage {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 1rem 1.5rem 1.5rem;
    position: relative; overflow: hidden;
    touch-action: pan-y;
    user-select: none; -webkit-user-select: none;
  }

  /* ── DRAG HINT LABELS ── */
  .drag-hint {
    position: absolute; top: 50%; transform: translateY(-50%);
    font-size: 13px; font-weight: 800; letter-spacing: 0.12em;
    text-transform: uppercase; opacity: 0; pointer-events: none;
    transition: opacity 0.15s; z-index: 30;
  }
  .drag-hint-left { left: 18px; color: var(--red); }
  .drag-hint-right { right: 18px; color: var(--green); }

  /* ── CARD WRAPPER (handles transform during drag) ── */
  .card-wrapper {
    width: 100%; max-width: 420px; position: relative; z-index: 10;
    transform-origin: center bottom;
    -webkit-transform-origin: center bottom;
    will-change: transform;
    cursor: grab;
    -webkit-backface-visibility: hidden;
    backface-visibility: hidden;
  }
  .card-wrapper:active { cursor: grabbing; }

  /* ── CARD FACE ── */
  .main-card {
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: 24px; padding: 2.5rem 2rem; text-align: center;
    min-height: 220px; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    position: relative; overflow: hidden;
    transition: border-color 0.1s;
  }
  /* Color wash on card during drag */
  .card-wrapper.dragging-left .main-card { border-color: var(--red); }
  .card-wrapper.dragging-right .main-card { border-color: var(--green); }

  /* Corner labels that appear while dragging */
  .card-corner-label {
    position: absolute; top: 18px; font-size: 13px; font-weight: 800;
    letter-spacing: 0.1em; text-transform: uppercase; padding: 4px 10px;
    border-radius: 8px; opacity: 0; transition: opacity 0.1s;
    pointer-events: none; z-index: 5;
  }
  .corner-got { left: 18px; color: var(--green); border: 2px solid var(--green); }
  .corner-pass { right: 18px; color: var(--red); border: 2px solid var(--red); }
  .card-wrapper.dragging-right .corner-got  { opacity: 1; }
  .card-wrapper.dragging-left  .corner-pass { opacity: 1; }

  /* Particle burst container */
  .burst-container {
    position: absolute; inset: 0; pointer-events: none; z-index: 50; overflow: hidden;
  }
  .particle {
    position: absolute; border-radius: 50%; pointer-events: none;
    animation: particle-fly 0.6s ease-out forwards;
  }
  @keyframes particle-fly {
    0% { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
  }

  /* Fly-off animations */
  @keyframes card-enter {
    0%   { transform: scale(0.82) translateY(32px); opacity: 0; }
    60%  { transform: scale(1.03) translateY(-4px); opacity: 1; }
    100% { transform: scale(1) translateY(0); opacity: 1; }
  }
  .card-wrapper.entering  { animation: card-enter 0.38s cubic-bezier(.34,1.56,.64,1) forwards; }

  /* Screen flash */
  .screen-flash {
    position: absolute; inset: 0; pointer-events: none; z-index: 40; opacity: 0;
  }
  .screen-flash.flash-go { animation: flash-burst 0.35s ease forwards; }
  @keyframes flash-burst {
    0%   { opacity: 0.6; }
    100% { opacity: 0; }
  }

  .card-badge {
    font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 4px 12px; border-radius: 20px; margin-bottom: 1.2rem;
  }
  .act-label { font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--accent); }
  .card-word { font-size: 34px; font-weight: 800; color: var(--text); line-height: 1.2; margin-bottom: 8px; letter-spacing: -0.5px; position: relative; z-index: 2; }
  .card-hint { font-size: 14px; color: var(--muted); line-height: 1.5; position: relative; z-index: 2; }

  /* ── SWIPE GUIDE CHIPS ── */
  .swipe-guides {
    display: flex; width: 100%; max-width: 420px; justify-content: space-between;
    padding: 0 4px; margin-top: 1.2rem; position: relative; z-index: 2; pointer-events: none;
  }
  .guide-chip {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
    padding: 8px 16px; border-radius: 50px;
  }
  .guide-got  { background: var(--green-dim); color: var(--green); }
  .guide-pass { background: var(--red-dim);   color: var(--red); }

  /* ── RESULTS ── */
  #results-screen { background: var(--bg); }
  .results-hero {
    text-align: center; padding: 2rem 1.5rem 1.5rem; flex-shrink: 0;
  }
  .results-emoji { font-size: 52px; margin-bottom: 6px; }
  .results-title { font-size: 26px; font-weight: 800; margin-bottom: 4px; }
  .results-sub { font-size: 14px; color: var(--muted); margin-bottom: 1.5rem; }
  .score-pills { display: flex; gap: 12px; justify-content: center; }
  .score-pill {
    padding: 12px 24px; border-radius: 16px; text-align: center;
    flex: 1; max-width: 140px;
  }
  .score-pill-num { font-size: 32px; font-weight: 800; }
  .score-pill-lbl { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; font-weight: 600; }
  .pill-green { background: var(--green-dim); color: var(--green); }
  .pill-red { background: var(--red-dim); color: var(--red); }
  .results-list { flex: 1; overflow-y: auto; padding: 12px 16px; }
  .result-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border-radius: 12px; margin-bottom: 6px;
    border: 1px solid var(--border); background: var(--surface);
  }
  .result-row.got { border-color: rgba(62,207,142,0.2); background: rgba(62,207,142,0.05); }
  .result-row.miss { border-color: rgba(255,95,87,0.2); background: rgba(255,95,87,0.05); }
  .result-word { font-size: 14px; font-weight: 600; flex: 1; }
  .result-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 700; }
  .badge-got { background: var(--green-dim); color: var(--green); }
  .badge-miss { background: var(--red-dim); color: var(--red); }
  .results-actions { display: flex; gap: 10px; padding: 16px; flex-shrink: 0; }
  .results-actions .big-btn { margin: 0; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  /* ══════════════════════════════════════════
     RESPONSIVE — PORTRAIT + LANDSCAPE MOBILE
  ══════════════════════════════════════════ */

  /* ── PORTRAIT (default — phone upright) ── */
  /* Everything already works in portrait.
     Just ensure the card is big and readable. */

  /* ── LANDSCAPE — game screen ── */
  @media (orientation: landscape) and (max-height: 520px) {
    /* In landscape the screen is wide + short.
       Stack HUD on the side, card fills center. */
    #game-screen { flex-direction: row; flex-wrap: wrap; }

    .game-hud {
      flex-direction: column; align-items: center; justify-content: center;
      width: 72px; height: 100%; padding: 12px 8px;
      border-right: 1px solid var(--border); flex-shrink: 0;
    }
    .hud-score { flex-direction: column; gap: 12px; }
    .hud-item { text-align: center; }
    .hud-num { font-size: 22px; }
    .hud-lbl { font-size: 9px; }
    .timer-ring { width: 52px; height: 52px; margin-top: 12px; }
    .timer-ring svg { width: 52px; height: 52px; }
    .timer-ring-num { font-size: 14px; }

    .progress-track { display: none; }

    .card-stage {
      flex: 1; height: 100%;
      padding: 0.5rem 1rem;
    }

    .main-card {
      min-height: 0; padding: 1.5rem 1.5rem;
      max-height: calc(100vh - 1rem);
    }
    .card-word { font-size: clamp(24px, 5vw, 42px); }
    .card-hint { font-size: 13px; }
    .card-badge { margin-bottom: 0.6rem; }

    .swipe-guides { margin-top: 0.6rem; }
  }

    const size = 4 + Math.random()*10;
    const delay = Math.random()*12;
    const dur   = 8 + Math.random()*10;
    const left  = Math.random()*100;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      left:${left}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      opacity:${0.15+Math.random()*0.25};
      animation-delay:${delay}s;
      animation-duration:${dur}s;
    `;
    container.appendChild(p);
  }
})();

/* Deck colors */
const DECK_STYLES = [
  { bg: 'linear-gradient(145deg, #6d28d9 0%, #4c1d95 100%)', shadow: 'rgba(109,40,217,0.5)' },
  { bg: 'linear-gradient(145deg, #059669 0%, #064e3b 100%)', shadow: 'rgba(5,150,105,0.5)' },
  { bg: 'linear-gradient(145deg, #db2777 0%, #831843 100%)', shadow: 'rgba(219,39,119,0.5)' },
  { bg: 'linear-gradient(145deg, #d97706 0%, #78350f 100%)', shadow: 'rgba(217,119,6,0.5)' },
  { bg: 'linear-gradient(145deg, #1d4ed8 0%, #1e3a8a 100%)', shadow: 'rgba(29,78,216,0.5)' },
];

/* Build carousel */
const carousel     = document.getElementById('deck-carousel');
const dotsContainer = document.getElementById('carousel-dots');
let activeIdx = 0;

const cardEls = [];
const dotEls  = [];

CATS.forEach((cat, i) => {
  const style = DECK_STYLES[i % DECK_STYLES.length];
  const previews = [...cat.words].sort(()=>Math.random()-.5).slice(0,3).map(w=>w.w);

  const card = document.createElement('div');
  card.className = 'deck-card-big';
  card.style.cssText = `background:${style.bg}; box-shadow:0 20px 60px ${style.shadow};`;
  card.innerHTML = `
    <div class="deck-card-top">
      <span class="deck-card-icon">${cat.icon}</span>
      <span class="deck-card-count-badge">${cat.words.length} cards</span>
    </div>
    <div class="deck-card-name">${cat.name}</div>
    <div class="deck-card-preview">
      ${previews.map(w=>`<div class="preview-word">${w}</div>`).join('')}
    </div>
    <div class="deck-card-footer">
      <button class="deck-browse-btn">Browse deck</button>
      <span class="deck-pick-hint">Tap to select</span>
    </div>`;

  carousel.appendChild(card);
  cardEls.push(card);

  card.querySelector('.deck-browse-btn').addEventListener('click', e => {
    e.stopPropagation(); openDeck(cat);
  });

  card.addEventListener('click', e => {
    if(e.target.classList.contains('deck-browse-btn')) return;
    const clickedIdx = cardEls.indexOf(card);
    if(clickedIdx !== activeIdx) {
      goToCard(clickedIdx); return;
    }
    // Select this deck
    selCat = CATS[activeIdx];
    cardEls.forEach((c,j) => c.style.outline = j===activeIdx ? '3px solid rgba(255,255,255,0.6)' : '');
    $('start-btn').style.display = 'none';
    $('timer-go-btn').style.display = 'block';
    $('timer-go-btn').textContent = `Play ${CATS[activeIdx].name} →`;
  });

  const dot = document.createElement('div');
  dot.className = 'carousel-dot' + (i===0 ? ' active' : '');
  dot.addEventListener('click', () => goToCard(i));
  dotsContainer.appendChild(dot);
  dotEls.push(dot);
});

function goToCard(idx, animated=true) {
  idx = Math.max(0, Math.min(idx, cardEls.length-1));
  activeIdx = idx;
  // Scroll the carousel to center this card
  const card = cardEls[idx];
  const cardLeft  = card.offsetLeft;
  const cardWidth = card.offsetWidth;
  const scrollTo  = cardLeft - (carousel.offsetWidth / 2) + (cardWidth / 2);
  carousel.scrollTo({ left: scrollTo, behavior: animated ? 'smooth' : 'instant' });
  updateUI();
}

function updateUI() {
  dotEls.forEach((d,i) => d.classList.toggle('active', i===activeIdx));
  const btnL = $('arrow-left');
  const btnR = $('arrow-right');
  if(btnL) btnL.classList.toggle('hidden', activeIdx === 0);
  if(btnR) btnR.classList.toggle('hidden', activeIdx === cardEls.length-1);
  const thumb = $('scroll-thumb');
  if(thumb && cardEls.length) {
    const pct    = cardEls.length > 1 ? activeIdx / (cardEls.length-1) : 0;
    const thumbW = 100 / cardEls.length;
    thumb.style.width = thumbW + '%';
    thumb.style.left  = (pct * (100-thumbW)) + '%';
  }
  // Dim non-active cards
  cardEls.forEach((card,i) => {
    const diff = Math.abs(i - activeIdx);
    card.classList.toggle('neighbour', diff === 1);
    card.classList.toggle('far-card',  diff > 1);
  });
}

// Arrow buttons
document.getElementById('arrow-left').addEventListener('click',  () => goToCard(activeIdx-1));
document.getElementById('arrow-right').addEventListener('click', () => goToCard(activeIdx+1));

// Detect which card is centered after native scroll settles
let scrollTimer;
carousel.addEventListener('scroll', () => {
  clearTimeout(scrollTimer);
  scrollTimer = setTimeout(() => {
    // Find the card closest to center
    const center = carousel.scrollLeft + carousel.offsetWidth / 2;
    let closest = 0, minDist = Infinity;
    cardEls.forEach((card, i) => {
      const cardCenter = card.offsetLeft + card.offsetWidth / 2;
      const dist = Math.abs(cardCenter - center);
      if(dist < minDist) { minDist = dist; closest = i; }
    });
    if(closest !== activeIdx) { activeIdx = closest; updateUI(); }
  }, 80);
}, {passive: true});

/* Initial position — wait for layout */
requestAnimationFrame(() => requestAnimationFrame(() => {
  goToCard(0, false);
}));

/* Also handle return to home */
function resetHome(){
  selCat=null;
  cardEls.forEach(c=>c.style.outline='');
  $('start-btn').style.display='block';
  $('start-btn').disabled=true;
  $('start-btn').textContent='Choose a deck';
  $('timer-go-btn').style.display='none';
  updateUI();
}

/* ──────── DECK VIEWER ──────── */
let _viewingCat=null;
function openDeck(cat){
  _viewingCat=cat;
  $('deck-title').textContent=`${cat.icon} ${cat.name}`;
  $('deck-count').textContent=`${cat.words.length} cards`;
  $('deck-search').value='';
  renderDeck(cat,cat.words);
  show('deck-screen');
}
function renderDeck(cat,words){
  const list=$('deck-list'); list.innerHTML='';
  words.forEach((item,i)=>{
    const row=document.createElement('div');
    row.className='deck-card';
    row.innerHTML=`<div class="deck-num">${i+1}</div>
      <div><div class="deck-word">${item.w}</div>${cat.actOnly?'':` <div class="deck-hint">${item.h}</div>`}</div>`;
    list.appendChild(row);
  });
}
$('deck-back').addEventListener('click',()=>{ _viewingCat=null; show('start-screen'); });
$('deck-search').oninput=e=>{
  if(!_viewingCat)return;
  const q=e.target.value.toLowerCase();
  renderDeck(_viewingCat,_viewingCat.words.filter(w=>w.w.toLowerCase().includes(q)));
};

/* ──────── TIMER SCREEN ──────── */
$('timer-go-btn').addEventListener('click',()=>show('timer-screen'));
document.querySelectorAll('.ts-opt').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.ts-opt').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); selTimer=parseInt(btn.dataset.val);
    $('ts-display').textContent=selTimer>=120?'2 min':selTimer+'s';
  });
});
$('go-btn').addEventListener('click',()=>{if(selCat)doCountdown();});
$('timer-back-btn').addEventListener('click',()=>show('start-screen'));

/* ──────── COUNTDOWN ──────── */
function doCountdown(){
  show('countdown-screen'); let n=3; $('cd-num').textContent=n; clearInterval(cdInt);
  cdInt=setInterval(()=>{
    n--; if(n<=0){clearInterval(cdInt);startGame();return;}
    const el=$('cd-num');el.style.animation='none';el.offsetHeight;el.style.animation='cdbop .6s cubic-bezier(.36,.07,.19,.97)';
    el.textContent=n;
  },1000);
}

/* ──────── GAME ──────── */
const CIRC=2*Math.PI*27;
function startGame(){
  gameWords=shuffle(selCat.words); curIdx=0; correct=0; passed=0; results=[];
  secsLeft=selTimer; animating=false; dragActive=false; dragCurX=0;
  $('hud-correct').textContent=0; $('hud-pass').textContent=0;
  updateTimer(); $('progress-fill').style.width='0%';
  show('game-screen');

  const w=$('card-wrapper');
  w.style.transition=''; w.style.transform=''; w.style.opacity='1';
  w.classList.remove('fly-left','fly-right','entering','dragging-left','dragging-right');
  populateCard();
  requestAnimationFrame(()=>{ w.classList.add('entering'); setTimeout(()=>w.classList.remove('entering'),420); });
  clearInterval(timerInt);
  timerInt=setInterval(()=>{secsLeft--;updateTimer();if(secsLeft<=0){clearInterval(timerInt);endGame();}},1000);
}

function populateCard(){
  if(curIdx>=gameWords.length) return;
  const w=gameWords[curIdx];
  const badge=$('card-badge');
  badge.textContent=selCat.name;
  badge.style.background=selCat.accentBg;
  badge.style.color=selCat.accent;
  const al=$('act-label');
  al.style.display=selCat.actOnly?'block':'none';
  $('card-word').textContent=w.w;
  $('card-hint').textContent=selCat.actOnly?'':w.h;
  $('progress-fill').style.width=Math.round((curIdx/gameWords.length)*100)+'%';
}

function updateTimer(){
  const ratio=secsLeft/selTimer;
  const offset=CIRC*(1-ratio);
  $('timer-arc').style.strokeDashoffset=offset;
  $('timer-num').textContent=secsLeft;
  $('timer-arc').style.stroke=secsLeft<=10?'var(--red)':secsLeft<=20?'var(--amber)':'var(--green)';
}

/* ════════════════════════════════════════════
   SWIPE ENGINE
   ════════════════════════════════════════════ */
const SWIPE_THRESHOLD = 80;   // px to commit a swipe
const TILT_MAX = 18;           // max rotation degrees
let dragActive = false;
let dragStartX = 0, dragStartY = 0;
let dragCurX = 0;
let animating = false;

const wrapper = $('card-wrapper');
const hintL = $('hint-left');
const hintR = $('hint-right');
const flash  = $('screen-flash');
const burst  = $('burst-container');

function setDragState(dx) {
  const pct = Math.min(Math.abs(dx) / SWIPE_THRESHOLD, 1);
  const rot  = (dx / SWIPE_THRESHOLD) * TILT_MAX;
  wrapper.style.transform = `translateX(${dx}px) rotate(${rot}deg)`;
  // swipe RIGHT = Got it, swipe LEFT = Pass
  hintL.style.opacity = dx < -20 ? Math.min(pct * 1.4, 1) : 0;
  hintR.style.opacity = dx > 20  ? Math.min(pct * 1.4, 1) : 0;
  wrapper.classList.toggle('dragging-left',  dx < -30);
  wrapper.classList.toggle('dragging-right', dx > 30);
}

function resetDrag() {
  wrapper.style.transition = 'transform 0.3s cubic-bezier(.34,1.56,.64,1)';
  wrapper.style.transform  = 'translateX(0) rotate(0deg)';
  wrapper.classList.remove('dragging-left','dragging-right');
  hintL.style.opacity = 0; hintR.style.opacity = 0;
  setTimeout(()=>{ wrapper.style.transition=''; }, 300);
}

function spawnParticles(isGot) {
  burst.innerHTML = '';
  const color  = isGot ? '#3ecf8e' : '#ff5f57';
  const colors = isGot
    ? ['#3ecf8e','#a8f0d0','#22c55e','#fff']
    : ['#ff5f57','#ffb3ae','#ef4444','#fff'];
  const cx = wrapper.getBoundingClientRect().left + wrapper.offsetWidth/2 - $('card-stage').getBoundingClientRect().left;
  const cy = wrapper.getBoundingClientRect().top  + wrapper.offsetHeight/2 - $('card-stage').getBoundingClientRect().top;
  for(let i=0;i<18;i++){
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = (Math.random()*360) * Math.PI/180;
    const dist  = 60 + Math.random()*80;
    const size  = 5 + Math.random()*8;
    p.style.cssText = `
      left:${cx}px; top:${cy}px;
      width:${size}px; height:${size}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      --tx:${Math.cos(angle)*dist}px; --ty:${Math.sin(angle)*dist}px;
      animation-delay:${Math.random()*0.05}s;
      animation-duration:${0.45+Math.random()*0.2}s;
    `;
    burst.appendChild(p);
  }
  setTimeout(()=>{ burst.innerHTML=''; }, 700);
}

function triggerFlash(isGot) {
  flash.style.background = isGot ? 'rgba(62,207,142,0.22)' : 'rgba(255,95,87,0.22)';
  flash.classList.remove('flash-go'); void flash.offsetWidth;
  flash.classList.add('flash-go');
}

function scoreHud(isGot) {
  const el = isGot ? $('hud-correct') : $('hud-pass');
  el.style.transform = 'scale(1.45)';
  el.style.transition = 'transform 0.15s cubic-bezier(.34,1.56,.64,1)';
  setTimeout(()=>{ el.style.transform='scale(1)'; }, 150);
}

function commitSwipe(direction) {
  if(animating) return;
  animating = true;

  const isGot = direction === 'got';

  // Capture the current drag offset so we fly FROM here, not from zero
  const startDx = dragCurX || (isGot ? 1 : -1); // keyboard fallback gives tiny nudge
  const targetX  = isGot ? window.innerWidth * 1.3 : -window.innerWidth * 1.3;
  const startRot = (startDx / (window.innerWidth * 0.5)) * 15;
  const endRot   = isGot ? 30 : -30;

  wrapper.classList.remove('entering','dragging-left','dragging-right');
  // Set current position without transition (already there from drag)
  wrapper.style.transition = 'none';
  wrapper.style.transform  = `translateX(${startDx}px) rotate(${startRot}deg)`;
  wrapper.style.opacity    = '1';

  // Tiny delay lets the browser paint the start position before transitioning
  // setTimeout(0) is more reliable than double-rAF on iOS Safari
  setTimeout(()=>{
    wrapper.style.transition = 'transform 0.30s cubic-bezier(.4,0,.8,1), opacity 0.28s ease';
    wrapper.style.transform  = `translateX(${targetX}px) rotate(${endRot}deg)`;
    wrapper.style.opacity    = '0';
  }, 10);

  // effects
  spawnParticles(isGot);
  triggerFlash(isGot);
  hintL.style.opacity = 0; hintR.style.opacity = 0;

  // record result
  if(curIdx < gameWords.length){
    results.push({w:gameWords[curIdx].w, got:isGot});
    if(isGot){ correct++; $('hud-correct').textContent=correct; }
    else      { passed++;  $('hud-pass').textContent=passed; }
    scoreHud(isGot);
    curIdx++;
    $('progress-fill').style.width=Math.round((curIdx/gameWords.length)*100)+'%';
  }

  setTimeout(()=>{
    wrapper.style.transition = 'none';
    wrapper.style.transform  = '';
    wrapper.style.opacity    = '1';
    if(curIdx >= gameWords.length){ clearInterval(timerInt); endGame(); animating=false; return; }
    populateCard();
    wrapper.classList.add('entering');
    setTimeout(()=>{ wrapper.classList.remove('entering'); animating=false; }, 420);
  }, 340);
}

/* ── POINTER EVENTS (works for both touch and mouse) ── */
function onPointerDown(e) {
  if(animating) return;
  const pt = e.touches ? e.touches[0] : e;
  dragStartX = pt.clientX; dragStartY = pt.clientY;
  dragActive = true;
  wrapper.style.transition = '';
}
function onPointerMove(e) {
  if(!dragActive) return;
  const pt = e.touches ? e.touches[0] : e;
  const dx = pt.clientX - dragStartX;
  const dy = pt.clientY - dragStartY;
  // Only hijack horizontal swipes; let iOS scroll vertically
  if(Math.abs(dx) > Math.abs(dy)) {
    e.preventDefault();
    dragCurX = dx;
    setDragState(dragCurX);
  } else if(Math.abs(dy) > 10 && Math.abs(dx) < 10) {
    // Clearly vertical — cancel drag
    dragActive = false;
    resetDrag();
    dragCurX = 0;
  }
}
function onPointerUp(e) {
  if(!dragActive) return;
  dragActive = false;
  if(Math.abs(dragCurX) >= SWIPE_THRESHOLD) {
    // swipe RIGHT = Got it, swipe LEFT = Pass
    commitSwipe(dragCurX > 0 ? 'got' : 'pass');
  } else {
    resetDrag();
  }
  dragCurX = 0;
}

// iOS Safari requires {passive:false} on touchstart for preventDefault to work on touchmove
$('card-stage').addEventListener('touchstart',  onPointerDown, {passive:false});
$('card-stage').addEventListener('touchmove',   onPointerMove, {passive:false});
$('card-stage').addEventListener('touchend',    onPointerUp,   {passive:false});
$('card-stage').addEventListener('touchcancel', ()=>{ dragActive=false; resetDrag(); dragCurX=0; }, {passive:false});
$('card-stage').addEventListener('mousedown',   onPointerDown);
$('card-stage').addEventListener('mousemove',   onPointerMove);
$('card-stage').addEventListener('mouseup',     onPointerUp);
$('card-stage').addEventListener('mouseleave',  onPointerUp);

/* ── KEYBOARD FALLBACK ── */
document.addEventListener('keydown',e=>{
  if(!document.querySelector('#game-screen.active')) return;
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') commitSwipe('got');
  if(e.key==='ArrowLeft' ||e.key==='a'||e.key==='A') commitSwipe('pass');
});

/* ──────── RESULTS ──────── */
function endGame(){
  show('results-screen');
  const emojis=correct>=12?'🔥':correct>=8?'🎉':correct>=4?'👍':'😅';
  const msgs=correct>=12?'Absolutely legendary!':correct>=8?'Great round!':correct>=4?'Solid effort!':'Run it back!';
  $('results-emoji').textContent=emojis;
  $('results-title').textContent=msgs;
  $('results-sub').textContent=`${selCat.name} · ${selTimer}s round`;
  $('res-correct').textContent=correct; $('res-pass').textContent=passed;
  const list=$('results-list'); list.innerHTML='';
  results.forEach(r=>{
    const row=document.createElement('div');
    row.className=`result-row ${r.got?'got':'miss'}`;
    row.innerHTML=`<span style="font-size:18px">${r.got?'✅':'❌'}</span>
      <span class="result-word">${r.w}</span>
      <span class="result-badge ${r.got?'badge-got':'badge-miss'}">${r.got?'Got it':'Passed'}</span>`;
    list.appendChild(row);
  });
}
$('res-replay-btn').addEventListener('click',()=>{show('timer-screen');});
$('res-home-btn').addEventListener('click',()=>{ resetHome(); show('start-screen'); });
</script>
</body>
